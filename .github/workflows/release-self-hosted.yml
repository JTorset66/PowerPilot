name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on:
      - self-hosted
      - windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify PureBasic compiler is available
        shell: powershell
        run: |
          $compiler = Get-Command pbcompiler -ErrorAction SilentlyContinue
          if (-not $compiler) {
            throw "pbcompiler was not found on PATH for this runner."
          }
          Write-Host "Using compiler:" $compiler.Source

      - name: Verify Inno Setup is available
        shell: powershell
        run: |
          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc -and -not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            throw "ISCC.exe was not found on PATH for this runner."
          }

      - name: Build executable and installer
        shell: powershell
        run: |
          .\build-installer.ps1

      - name: Create SHA256 checksums
        shell: powershell
        run: |
          Get-ChildItem .\build\*.exe | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant()) *$($_.Name)" | Set-Content -Path (Join-Path $_.Directory.FullName "$($_.Name).sha256") -Encoding ascii
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powerpilot-windows-x64
          path: |
            build/*.exe
            build/*.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.exe
            build/*.sha256
          generate_release_notes: true
